        - variable:
            name: ObsErrorData/airTemperature
          value: is_valid
        - variable: ObsType/airTemperature
          is_in: 120
        defer to post: true
      - filter: Background Check
        udescriptor: gross_error_check
        apply at iterations: 0,1
        filter variables:
        - name: airTemperature
        threshold: 7.0
        action:
          name: reject
        where:
        - variable: QualityMarker/airTemperature
          is_not_in: 3
        - variable: ObsType/airTemperature
          is_in: 120
        defer to post: true
      - filter: Background Check
