          is_in: 120
      - filter: Bounds Check
        udescriptor: bounds_check_ObsError
        filter variables:
        - name: airTemperature
        test variables:
        - name: ObsErrorData/airTemperature
        minvalue: 0.0
        maxvalue: 1000
        where:
