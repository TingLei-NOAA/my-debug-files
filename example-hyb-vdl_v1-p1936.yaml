          name: inflate error
          inflation variable:
            name: ObsFunction/ObsErrorFactorPressureCheck
            options:
              variable: airTemperature
              surface observation error ramp: true
              max levels below surface: 15
              inflation factor: 8.0
      - filter: Perform Action
        udescriptor: error_inflation_errormod
        filter variables:
        - name: airTemperature
        where:
