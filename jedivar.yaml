      obs operator:
        name: CRTM
        Absorbers:
        - H2O
        - O3
        - CO2
        obs options:
          Sensor_ID: abi_g18
          EndianType: little_endian
          CoefficientPath: data/crtm/
        linear obs operator:
          Absorbers:
