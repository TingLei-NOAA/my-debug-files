      - filter: Perform Action
        filter variables:
        - name: brightnessTemperature
          channels: 8-10
        where:
        - variable:
            name: ClearSkyStdDev/brightnessTemperature
            channels: 8
          maxvalue: 0.6
          minvalue: 0.5
          min_exclusive: true
        action:
