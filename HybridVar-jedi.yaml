_poolsize: &poolsize 40
_write_mult: &write_mult true
#_layout: &fv3_layout [32, 40] # 1280 tasks, original SKD test
#_layout: &fv3_layout [20, 24] # 8 ppn
#_layout: &fv3_layout [30, 32] # 16 ppn
_layout: &fv3_layout [44, 44] # 32 ppn, 1920 total ranks
#_layout: &fv3_layout [60, 64] # 64 ppn
_xlayout: &xlayout 44
_ylayout: &ylayout 44

variational:
  minimizer:
    algorithm: DRPCG
  iterations:
  - ninner: 50 
    gradient norm reduction: 1e-12
    geometry:
      fms initialization:
        namelist filename: DataFix/fmsmpp.nml
        field table filename: DataFix/field_table
      namelist filename: INPUT/3kmNA_p1936_input.nml
      akbk: DataFix/fix/akbk66.nc
      # input.nml
      npz: 65
      layout: *fv3_layout
      io_layout: [1,1]
      ntiles: 1
      fieldsets:
      - fieldset: DataFix/fix/dynamics_lam_cmaq.yaml
  - ninner: 50 
    gradient norm reduction: 1e-12
    geometry:
      fms initialization:
        namelist filename: DataFix/fmsmpp.nml
        field table filename: DataFix/field_table
      namelist filename: ./INPUT/3kmNA_p1936_input.nml
      akbk: DataFix/fix/akbk66.nc
      # input.nml
      npz: 65
      layout: *fv3_layout
      io_layout: [1,1]
      ntiles: 1
      fieldsets:
      - fieldset: DataFix/fix/dynamics_lam_cmaq.yaml

output:
  filetype: fms restart
  regional restart: true
  datapath: ./
  prefix: p1936-hyb-norm-vdl
  frequency: PT1H

cost function:
  cost type: 3D-Var
  time window:
      begin: 2026-05-28T00:00:00Z
      length: PT2H
  jb evaluation: false
  analysis variables: &3dvars 
  - cloud_liquid_ice
  - cloud_liquid_water
  - eastward_wind
  - northward_wind
  - air_temperature
  - water_vapor_mixing_ratio_wrt_moist_air
  - ozone_mass_mixing_ratio
  - air_pressure_at_surface

  geometry:
    fms initialization:
      namelist filename: DataFix/fmsmpp.nml
      field table filename: DataFix/field_table
    namelist filename: INPUT/3kmNA_p1936_input.nml
    akbk: DataFix/fix/akbk66.nc
    # input.nml
    npz: 65
    layout: *fv3_layout
    io_layout: [1,1]
    ntiles: 1


  background:
    datetime: &analysisDate 2026-05-28T01:00:00Z
    regional restart: true
    filetype: fms restart
    datapath: data/inputs/bkg
    filename_core: fv_core.res.tile1.nc
    filename_trcr: fv_tracer.res.tile1.nc
    filename_sfcd: sfc_data.nc
    filename_sfcw: fv_srf_wnd.res.tile1.nc
    filename_cplr: coupler.res
    state variables:
      - eastward_wind
      - northward_wind
      - air_temperature
      - air_pressure_thickness
      - water_vapor_mixing_ratio_wrt_moist_air
      - cloud_liquid_ice
      - cloud_liquid_water
      - ozone_mass_mixing_ratio
      - geopotential_height_times_gravity_at_surface
      - f10m
      - slmsk
      - sheleg
      - skin_temperature_at_surface
      - vtype
      - stype
      - vfrac
      - soilt
      - soilm
      - eastward_wind_at_surface
      - northward_wind_at_surface
      - air_pressure_at_surface
    field io names: &io_names
      eastward_wind: ua
      northward_wind: va
      air_temperature: T
      #air_pressure_thickness: DELP
      air_pressure_thickness: delp
      water_vapor_mixing_ratio_wrt_moist_air: sphum
      cloud_liquid_ice: ice_wat
      cloud_liquid_water: liq_wat
      ozone_mass_mixing_ratio: o3mr
      geopotential_height_times_gravity_at_surface: phis
      skin_temperature_at_surface: tsfc
      soilt: tslb
      soilm: smois
      eastward_wind_at_surface: u_srf
      northward_wind_at_surface: v_srf
  background error:
    covariance model: hybrid
    components:
    - covariance:
        covariance model: SABER
        saber central block:
          saber block name: gsi static covariance
          active variables:
          - eastward_wind
          - northward_wind
          - virtual_temperature
          - water_vapor_mixing_ratio_wrt_moist_air
          - ozone_mass_mixing_ratio
          - air_pressure_at_surface
          read:
            gsi akbk: fv3_akbk
            gsi error covariance file: berror_stats
            gsi berror namelist file: gsiparm_regional.anl
            processor layout x direction: 44 
            processor layout y direction: 44 
            debugging deep bypass gsi B error: false
            debugging mode: false
            regional mode: true
        saber outer blocks:
        - saber block name: interpolation
          fill state missing values: true
          inner geometry:
            function space: StructuredColumns
            custom grid matching gsi:
              type: rotated_lonlat
              lats: 1351
              lons: 1976
              lat_start: -36.4147012390921
              lat_end: 36.4147012390921
              lon_start: -59.7587096910596
              lon_end: 59.7587096910596
              north_pole_lat: 34.9999966097
              north_pole_lon: 67.4999923706
            custom partitioner matching gsi:
              bands: 44 
            halo: 1
          forward interpolator:
            local interpolator type: oops unstructured grid interpolator
          inverse interpolator:
            local interpolator type: oops unstructured grid interpolator
            regional nn fill distance in km: 800
          state variables to inverse:
          - eastward_wind
          - northward_wind
          - air_temperature
          - water_vapor_mixing_ratio_wrt_moist_air
          - ozone_mass_mixing_ratio
          - geopotential_height_times_gravity_at_surface
          - air_pressure_thickness
          - air_pressure_at_surface
        linear variable change:
          linear variable change name: Control2Analysis
          input variables:
          - eastward_wind
          - northward_wind
          - virtual_temperature
          - water_vapor_mixing_ratio_wrt_moist_air
          - ozone_mass_mixing_ratio
          - air_pressure_at_surface
          - cloud_liquid_ice
          - cloud_liquid_water
          output variables:
          - eastward_wind
          - northward_wind
          - air_temperature
          - water_vapor_mixing_ratio_wrt_moist_air
          - ozone_mass_mixing_ratio
          - air_pressure_at_surface
          - cloud_liquid_ice
          - cloud_liquid_water
      weight:
        value: 0.2
    - covariance:
        covariance model: ensemble
        members from template:
          template:
            datetime: *analysisDate 
            filetype: fms restart
            regional restart: true
            state variables: *3dvars
            field io names: *io_names
            datapath: data/inputs/mem%mem%/
            filename_core: fv_core.res.tile1.nc
            filename_trcr: fv_tracer.res.tile1.nc
            filename_cplr: coupler.res
          pattern: "%mem%"
          nmembers: 30 
          zero padding: 3
        localization:
          localization method: SABER
          saber central block:
            saber block name: MGBF_covariance
            mgbf sdl and vdl init namelist file: dr-mgbf-fix/norm-sdl_vdl_v1_init-p1936.nml
          saber outer blocks:
          -  saber block name: interpolation
             inner geometry:
               function space: StructuredColumns
               grid:
                 type: structured
                 xspace:
                   type: linear
                   N: 1232 
                   start: -60.0310278618037
                   end:   60.0310278618037
                   endpoint: true
                 yspace:
                   type: linear
                   N: 1232 
                   start: -36.6574659140194
                   end:   36.6574659140194
                   endpoint: true
                 projection:
                   type: rotated_lonlat
                   north_pole: [67.4999923706, 34.9999966097]
                 y_numbering: 1

               partitioner: checkerboard
               halo:  1

             forward interpolator:
                 local interpolator type: oops unstructured grid interpolator
             inverse interpolator:
                 local nterpolator type: oops unstructured grid interpolator
      weight:
        value: 0.8

  observations:
    observers:
    - obs space:
        name: aircar_airTemperature_133
        obsdatain:
          engine:
            type: H5File
            obsfile: data/obs/ioda_aircar.nc
            missing file action: warn
          obsgrouping:
            group variables:
            - stationIdentification
            sort variable: pressure
            sort order: descending
        obsdataout:
          empty obs space action: create output
          write multiple files: false
          engine:
            type: H5File
            obsfile: jdiag_aircar_airTemperature_133.nc
            allow overwrite: true
        io pool:
          max pool size: 80
        observed variables:
        - airTemperature
        simulated variables:
        - airTemperature
        use data frame container: true
        redistribution:
          name: Halo
          halo size: 300e3
      obs operator:
        name: VertInterp
        vertical coordinate: air_pressure
        observation vertical coordinate: pressure
        observation vertical coordinate group: MetaData
        interpolation method: log-linear
        variables:
        - name: airTemperature
      linear obs operator:
        name: VertInterp
      obs filters:
      - filter: Perform Action
        udescriptor: iuse_check
        filter variables:
        - name: airTemperature
        where:
        - variable: ObsType/airTemperature
          is_in: 133
        action:
          name: accept
      - filter: Perform Action
        udescriptor: obs_type_check
        where:
        - variable: ObsValue/airTemperature
          value: is_not_valid
        action:
          name: reduce obs space
      - filter: Perform Action
        udescriptor: obs_kx_check
        where:
        - variable: ObsType/airTemperature
          is_not_in: 133
        action:
          name: reduce obs space
      - filter: RejectList
        udescriptor: quality_marker_check
        filter variables:
        - name: airTemperature
        where:
        - variable: QualityMarker/airTemperature
          is_in: 4-15
          value: is_not_valid
        where operator: or
        action:
          name: reduce obs space
      - filter: Bounds Check
        udescriptor: time_window_check
        filter variables:
        - name: airTemperature
        test variables:
        - name: MetaData/timeOffset
        minvalue: -2700
        maxvalue: 2700
        where:
        - variable: ObsType/airTemperature
          is_in: 133
        action:
          name: reduce obs space
      - filter: Temporal Thinning
        udescriptor: duplicate_check
        filter variables:
        - name: airTemperature
        min_spacing: PT90M
        tolerance: PT0H
        seed_time: '2026-05-03T02:00:00Z'
        category_variable:
          name: MetaData/longitude_latitude_pressure
        where:
        - variable: ObsType/airTemperature
          is_in: 133
        action:
          name: reduce obs space
      - filter: Bounds Check
        udescriptor: online_domain_check
        filter variables:
        - name: airTemperature
        test variables:
        - name: GeoVaLs/observable_domain_mask
        minvalue: 0.0
        maxvalue: 0.5
      - filter: Perform Action
        udescriptor: initial_error_assignment
        filter variables:
        - name: airTemperature
        where:
        - variable: ObsType/airTemperature
          is_in: 133
        action:
          name: assign error
          error function:
            name: ObsFunction/ObsErrorModelStepwiseLinear
            options:
              xvar:
                name: MetaData/pressure
              xvals:
              - 110000
              - 105000
              - 100000
              - 95000
              - 90000
              - 85000
              - 80000
              - 75000
              - 70000
              - 65000
