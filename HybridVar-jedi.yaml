          is_in: 3
        - variable: ObsType/airTemperature
          is_in: 133
        defer to post: true
      - filter: Perform Action
        udescriptor: reassign_error_TempObsErrorData
        apply at iterations: 0,1
        filter variables:
        - name: airTemperature
        action:
          name: assign error
          error function: TempObsErrorData/airTemperature
        where:
        - variable:
            name: TempObsErrorData/airTemperature
          value: is_valid
        - variable: ObsType/airTemperature
          is_in: 133
        defer to post: true
      obs localizations:
      - localization method: Horizontal Gaspari-Cohn
        lengthscale: 300e3
