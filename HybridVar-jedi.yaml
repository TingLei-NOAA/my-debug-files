        udescriptor: error_inflation_pressure_check
        filter variables:
        - name: airTemperature
        where:
        - variable: ObsType/airTemperature
          is_in: 133
        action:
          name: inflate error
          inflation variable:
            name: ObsFunction/ObsErrorFactorPressureCheck
            options:
              variable: airTemperature
              surface observation error ramp: true
              max levels below surface: 15
              inflation factor: 8.0
      - filter: Perform Action
        udescriptor: error_inflation_QualityMarker
        filter variables:
        - name: airTemperature
        action:
          name: inflate error
          inflation factor: 1.2
        where:
        - variable: QualityMarker/airTemperature
          is_in: 3
        - variable: ObsType/airTemperature
          is_in: 133
      - filter: Perform Action
        udescriptor: error_inflation_observation_pressure
        filter variables:
        - name: airTemperature
        action:
          name: inflate error
          inflation factor: 1.2
        where:
        - variable: MetaData/pressure
          maxvalue: 10000.0
        - variable: ObsType/airTemperature
          is_in: 133
      - filter: Bounds Check
        udescriptor: bounds_check_ObsError
        filter variables:
        - name: airTemperature
        test variables:
        - name: ObsErrorData/airTemperature
        minvalue: 0.0
        maxvalue: 1000
        where:
        - variable: ObsType/airTemperature
          is_in: 133
        action:
          name: reduce obs space
      - filter: Bounds Check
        udescriptor: bounds_check_ObsValue
        filter variables:
        - name: airTemperature
        minvalue: 100
        maxvalue: 400
        where:
        - variable: ObsType/airTemperature
          is_in: 133
        action:
          name: reduce obs space
      - filter: Variable Assignment
        udescriptor: create_temporary_ObsErrorData
        apply at iterations: 0,1
        where:
        - variable: ObsType/airTemperature
          is_in: 133
        assignments:
        - name: TempObsErrorData/airTemperature
          type: float
          function:
            name: ObsFunction/Arithmetic
            options:
              variables:
              - name: ObsErrorData/airTemperature
        defer to post: true
      - filter: Perform Action
        udescriptor: ermin_set
        apply at iterations: 0,1
        filter variables:
        - name: airTemperature
        action:
          name: assign error
          error parameter: 1.3
        where:
        - variable:
            name: ObsErrorData/airTemperature
          maxvalue: 1.3
        - variable:
            name: ObsErrorData/airTemperature
          value: is_valid
        - variable: ObsType/airTemperature
          is_in: 133
        defer to post: true
      - filter: Perform Action
